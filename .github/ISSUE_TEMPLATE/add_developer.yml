name: "Add Developer to Awesome List"
description: "Request to add a Bangladeshi developer to the Awesome list."
title: "Add Developer"
labels: ["add-developer", "automation"]
body:
  - type: input
    id: github_username
    attributes:
      label: "GitHub Username"
      description: "The GitHub username of the developer (case-sensitive)."
      placeholder: "e.g. johndoe"
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: "Location"
      description: "Location as shown on the GitHub profile (must match config/metrics.json location aliases)."
      placeholder: "e.g. Dhaka, Bangladesh"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: "Why should this developer be added?"
      description: "Briefly explain why this developer should be included (impact, activity, etc.)."
      placeholder: "Active open source contributor, impactful projects, etc."
    validations:
      required: true
  - type: input
    id: evidence
    attributes:
      label: "Evidence (optional)"
      description: "Links to notable repos, contributions, or stats (optional)."
      placeholder: "https://github.com/johndoe/repo"
    validations:
      required: false
  - type: checkboxes
    id: agreement
    attributes:
      label: "Agreement"
      description: "I confirm that the information provided is accurate and complies with the Awesome list guidelines."
      options:
        - label: "I have read and agree to the contribution guidelines and understand that duplicate or ineligible entries will be rejected."
          required: true
